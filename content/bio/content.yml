title: Bio
bio:
  image:
    src: "profile-picture.png"
    alt: "Вершинина Анна"
  text: |
    Вершинина Анна родилась в 1992 г. в Улан-Удэ.

    Работает с офортом, линогравюрой и в смешанной технике, изучая взаимодействие времени, пространства и человеческого восприятия.

    В 2020 году окончила Московскую государственную художественно-промышленную академию им. Строганова, кафедру искусства графики.
    До этого обучалась живописи в Иркутском художественном училище.

    Анна участвовала в групповых выставках в России и за рубежом, в том числе в проекте MOI AUSSI ART GALLERY (2020, Венеция)
    и Архитектура неопределённого (2020, Москва). Также её работы были представлены на арт-ярмарках: Контур (2023, Нижний Новгород),
    Арт-ярмарка 3.0 (2023, Москва) и фестивале Вкус бумаги (2021, Москва).

    В своих работах исследует тему памяти, следов времени, соединяя реальные пейзажи с абстрактными впечатлениями и снами.

    Живёт и работает в Москве.
