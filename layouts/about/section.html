{{ define "main" }}
<main class="page">
    <h1 class="page__title">{{ .Title }}</h1>
    
    <div class="bio__content">
        <div class="bio__image">
            <img 
                src="/about/{{ .Params.bio.image }}" 
                alt="{{ .Params.bio.alt }}"
                width="400"
                height="600"
            />
        </div>
        
        <div class="bio__text">
            {{ .Params.bio.text | markdownify }}
        </div>
    </div>
</main>
{{ end }}
