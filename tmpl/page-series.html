{{define "page-series"}}
<!doctype html>
<html lang="ru">
    <head>
        {{template "part-head" .}}
        <title>{{.Title}} — портфолио художника</title>
        <link rel="stylesheet" href="/css/series.css" />
    </head>
    <body>
        {{template "part-header-page"}}

        <main class="series">
            <h1 class="series__title">{{.Title}}</h1>

            <div class="series__media">
                <div class="series__stage">
                    <button
                        class="nav nav--prev"
                        type="button"
                        aria-label="Предыдущая работа"
                    >
                        <img src="/img/btn_Previous.svg" alt="" />
                    </button>

                    <img
                        class="artwork"
                        src="assets/images/baikal-work-1.png"
                        alt="Живописная работа Байкал"
                        data-artwork-image
                    />

                    <button
                        class="nav nav--next"
                        type="button"
                        aria-label="Следующая работа"
                    >
                        <img src="/img/btn_Next.svg" alt="" />
                    </button>
                </div>

                <div class="slider-dots" data-slider-dots></div>

                <dl class="series__info" data-info>
                    <div class="info__name">
                        <dd data-meta="title">Байкал</dd>
                    </div>
                    <div class="info__row">
                        <dt>Год создания работы:</dt>
                        <dd data-meta="year">2020</dd>
                    </div>
                    <div class="info__row">
                        <dt>Техника:</dt>
                        <dd data-meta="technique">Темпера</dd>
                    </div>
                    <div class="info__row">
                        <dt>Размер:</dt>
                        <dd data-meta="size">80 × 60</dd>
                    </div>
                    <div class="info__row">
                        <dt>Лист:</dt>
                        <dd data-meta="sheet">1/4</dd>
                    </div>
                </dl>
            </div>
        </main>

        <main class="series">
            <h1 class="series__title">В ПОТОКЕ</h1>

            <div class="series__media">
                <div class="series__stage">
                    <img
                        class="artwork"
                        src="assets/images/vpotoke-work1.png"
                        alt="Графическая работа В потоке"
                    />
                </div>

                <dl class="series__info">
                    <div class="info__name">
                        <dd>В потоке</dd>
                    </div>
                    <div class="info__row">
                        <dt>Год создания работы:</dt>
                        <dd>2023</dd>
                    </div>
                    <div class="info__row">
                        <dt>Техника:</dt>
                        <dd>Линогравюра</dd>
                    </div>
                    <div class="info__row">
                        <dt>Размер:</dt>
                        <dd>58 × 32</dd>
                    </div>
                </dl>
            </div>
        </main>

        <script src="/js/theme.js"></script>
        <script src="/js/slider.js"></script>
        <script>
            const works = [
                {
                    image: "assets/images/baikal-work-1.png",
                    alt: "Живописная работа Байкал — лист 1",
                    title: "Байкал",
                    year: "2020",
                    technique: "Темпера",
                    size: "80 × 60",
                    sheet: "1/4",
                },
                {
                    image: "assets/images/baikal-work-2.png",
                    alt: "Живописная работа Байкал — лист 2",
                    title: "Байкал",
                    year: "2020",
                    technique: "Темпера",
                    size: "80 × 60",
                    sheet: "2/4",
                },
                {
                    image: "assets/images/baikal-work-3.png",
                    alt: "Живописная работа Байкал — лист 3",
                    title: "Байкал",
                    year: "2020",
                    technique: "Темпера",
                    size: "80 × 60",
                    sheet: "3/4",
                },
                {
                    image: "assets/images/baikal-work-4.png",
                    alt: "Живописная работа Байкал — лист 4",
                    title: "Байкал",
                    year: "2020",
                    technique: "Темпера",
                    size: "80 × 60",
                    sheet: "4/4",
                },
            ];

            initSlider();
        </script>
    </body>
</html>
{{end}}
