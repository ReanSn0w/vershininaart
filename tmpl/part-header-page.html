{{define "part-header-page"}}
<header class="site-header">
    <div class="site-header__top">
        <div class="site-header__brand">
            <a class="site-header__back" href="/" aria-label="Назад">
                <span class="site-header__back-icon" aria-hidden="true">
                    <img src="/img/btn_Back.svg" alt="" />
                </span>
                <span class="site-header__back-label">Назад</span>
            </a>
        </div>
        <button
            class="theme-toggle"
            type="button"
            aria-label="Переключить тему"
        >
            <img src="/img/btn_light.svg" alt="" />
        </button>
    </div>
</header>
{{end}}
